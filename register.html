<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MediAnalyze</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Keep all your existing styles - no changes */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header .logo {
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .auth-header h2 {
            color: var(--secondary);
            margin-bottom: 10px;
        }

        .auth-header p {
            color: var(--gray);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--secondary);
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .role-selector {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        .role-option {
            flex: 1;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .role-option.selected {
            border-color: var(--primary);
            background: rgba(42, 157, 143, 0.1);
        }

        .role-option i {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .doctor-fields {
            display: none;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .btn-auth {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-auth:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--gray);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .error-message {
            background: #fee;
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: #e8f5e9;
            color: #4caf50;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .password-strength {
            height: 5px;
            background: #eee;
            border-radius: 5px;
            margin-top: 8px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s;
        }

        .strength-weak {
            background: var(--danger);
            width: 33.33%;
        }

        .strength-medium {
            background: #ffc107;
            width: 66.66%;
        }

        .strength-strong {
            background: #4caf50;
            width: 100%;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-heartbeat"></i>
                <span>MediAnalyze</span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#features">Features</a></li>
                <li><a href="login.html" class="btn-outline">Login</a></li>
                <li><a href="register.html" class="btn-primary">Sign Up</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-heartbeat"></i>
                    <span>MediAnalyze</span>
                </div>
                <h2>Create Account</h2>
                <p>Join us for personalized healthcare assistance</p>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="registerForm">
                <!-- Basic Info -->
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="phoneNumber" placeholder="Enter phone number" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Password *</label>
                        <input type="password" id="password" placeholder="Create password" required>
                        <div class="password-strength">
                            <div class="password-strength-bar" id="passwordStrength"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password *</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                    </div>
                </div>

                <!-- Role Selection -->
                <div class="form-group">
                    <label>I am a *</label>
                    <div class="role-selector">
                        <div class="role-option selected" id="patientRole" onclick="selectRole('patient')">
                            <i class="fas fa-user"></i>
                            <h4>Patient</h4>
                        </div>
                        <div class="role-option" id="doctorRole" onclick="selectRole('doctor')">
                            <i class="fas fa-user-md"></i>
                            <h4>Doctor</h4>
                        </div>
                    </div>
                </div>

                <!-- Doctor Specific Fields -->
                <div class="doctor-fields" id="doctorFields">
                    <div class="form-group">
                        <label>Specialization *</label>
                        <select id="specialization">
                            <option value="">Select Specialization</option>
                            <option value="cardiologist">Cardiologist</option>
                            <option value="dermatologist">Dermatologist</option>
                            <option value="neurologist">Neurologist</option>
                            <option value="pediatrician">Pediatrician</option>
                            <option value="psychiatrist">Psychiatrist</option>
                            <option value="radiologist">Radiologist</option>
                            <option value="surgeon">Surgeon</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Medical License Number *</label>
                        <input type="text" id="licenseNumber" placeholder="Enter license number">
                    </div>
                </div>

                <!-- Additional Info -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" id="dob">
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender">
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                            <option value="prefer-not-to-say">Prefer not to say</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <textarea id="address" rows="3" placeholder="Enter your address"></textarea>
                </div>

                <button type="submit" class="btn-auth">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script>
        // ===== DEPLOYMENT CONFIGURATION =====
        // For local development vs production
        const API_BASE_URL = window.location.hostname === 'localhost'
            ? 'http://localhost:5000'
            : '';  // Empty means same domain (Render will serve both frontend and API)

        console.log('🌐 Using API URL:', API_BASE_URL || 'same domain');
        // ===================================
        let selectedRole = 'patient';

        // Role selection
        function selectRole(role) {
            selectedRole = role;

            // Update UI
            document.getElementById('patientRole').classList.toggle('selected', role === 'patient');
            document.getElementById('doctorRole').classList.toggle('selected', role === 'doctor');

            // Show/hide doctor fields
            const doctorFields = document.getElementById('doctorFields');
            doctorFields.style.display = role === 'doctor' ? 'block' : 'none';
        }

        // Password strength indicator
        document.getElementById('password').addEventListener('input', function (e) {
            const password = e.target.value;
            const strengthBar = document.getElementById('passwordStrength');

            // Remove all classes
            strengthBar.className = 'password-strength-bar';

            if (password.length === 0) {
                strengthBar.style.width = '0';
                return;
            }

            // Check strength
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            if (password.match(/[$@#&!]+/)) strength++;

            if (strength <= 2) {
                strengthBar.classList.add('strength-weak');
            } else if (strength <= 4) {
                strengthBar.classList.add('strength-medium');
            } else {
                strengthBar.classList.add('strength-strong');
            }
        });

        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            // Get form values
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate passwords match
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            // Validate password length
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            // Validate email format
            const email = document.getElementById('email').value;
            const emailRegex = /^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/;
            if (!emailRegex.test(email)) {
                showError('Please enter a valid email address');
                return;
            }

            // Validate phone number (simple validation)
            const phone = document.getElementById('phoneNumber').value;
            if (phone.length < 10) {
                showError('Please enter a valid phone number');
                return;
            }

            // Prepare user data
            const userData = {
                name: document.getElementById('name').value,
                email: email,
                phoneNumber: phone,
                password: password,
                role: selectedRole,
                dateOfBirth: document.getElementById('dob').value || undefined,
                gender: document.getElementById('gender').value || undefined,
                address: document.getElementById('address').value || undefined
            };

            // Add doctor fields if role is doctor
            if (selectedRole === 'doctor') {
                userData.specialization = document.getElementById('specialization').value;
                userData.licenseNumber = document.getElementById('licenseNumber').value;

                if (!userData.specialization || !userData.licenseNumber) {
                    showError('Please fill in all doctor fields');
                    return;
                }
            }

            // Show loading state
            const submitBtn = document.querySelector('.btn-auth');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            submitBtn.disabled = true;

            try {
                // Send to backend
                const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();

                if (response.ok) {
                    // Success
                    showSuccess('Account created successfully! Redirecting...');

                    // Save token to localStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Redirect to dashboard (same for both roles)
                    setTimeout(() => {
                        if (data.user.role === 'doctor') {
                            window.location.href = 'doctor-dashboard.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 2000);
                } else {
                    // Error
                    showError(data.message || 'Registration failed');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Network error. Please check if backend server is running.');
            } finally {
                // Reset button
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';

            // Hide success message if visible
            document.getElementById('successMessage').style.display = 'none';

            // Auto hide after 5 seconds
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';

            // Hide error message if visible
            document.getElementById('errorMessage').style.display = 'none';
        }
    </script>
</body>

</html>
