<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drug Interaction Checker - MediAnalyze</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .drug-container {
            padding: 100px 20px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .drug-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .drug-header h1 {
            color: var(--secondary);
            margin-bottom: 10px;
        }

        .drug-header p {
            color: var(--gray);
        }

        .medication-form {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }

        .form-row input {
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-row input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .remove-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 10px;
        }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            margin-right: 15px;
        }

        .add-btn:hover {
            background: var(--primary-dark);
        }

        .check-btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .check-btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .results-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            display: none;
        }

        .interaction-card {
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid;
        }

        .interaction-card.danger {
            background: #fee;
            border-left-color: var(--danger);
        }

        .interaction-card.warning {
            background: #fff3cd;
            border-left-color: #ffc107;
        }

        .interaction-card.safe {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }

        .medication-pair {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .severity-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .severity-badge.danger {
            background: var(--danger);
            color: white;
        }

        .severity-badge.warning {
            background: #ffc107;
            color: var(--dark);
        }

        .severity-badge.safe {
            background: #4caf50;
            color: white;
        }

        .timeline-container {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .timeline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: #ddd;
            z-index: 1;
        }

        .timeline-item {
            position: relative;
            z-index: 2;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid var(--primary);
            font-size: 0.9rem;
        }

        .timeline-item.warning {
            border-color: var(--danger);
            background: #fee;
        }

        .recommendation-list {
            list-style: none;
            padding: 0;
        }

        .recommendation-list li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }

        .recommendation-list li i {
            margin-right: 10px;
        }

        .recommendation-list li:last-child {
            border-bottom: none;
        }

        .info-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #2196f3;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-heartbeat"></i>
                <span>MediAnalyze</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="index.html" class="btn-outline">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="drug-container">
        <div class="drug-header">
            <h1><i class="fas fa-pills" style="color: var(--primary);"></i> Drug Interaction Checker</h1>
            <p>Check for harmful interactions between your medications</p>
        </div>

        <div class="medication-form" id="medicationForm">
            <h3 style="margin-bottom: 20px;">Add Your Medications</h3>

            <div id="medicationsList">
                <!-- Medication rows will be added here -->
                <div class="form-row" id="medRow1">
                    <input type="text" placeholder="Medicine name" class="med-name" list="medicines">
                    <input type="text" placeholder="Dosage (e.g., 500mg)" class="med-dosage">
                    <input type="text" placeholder="Timing (e.g., 8:00 AM)" class="med-timing">
                    <button class="remove-btn" onclick="removeMedication(1)" style="visibility: hidden;">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>

            <div style="margin: 20px 0;">
                <button class="add-btn" onclick="addMedication()">
                    <i class="fas fa-plus"></i> Add Another Medication
                </button>
            </div>

            <button class="check-btn" onclick="checkInteractions()">
                <i class="fas fa-search"></i> Check Interactions
            </button>
        </div>

        <div class="results-section" id="resultsSection">
            <h2 style="margin-bottom: 20px;">Interaction Analysis Results</h2>

            <div id="interactionResults">
                <!-- Results will be displayed here -->
            </div>
        </div>
    </div>

    <datalist id="medicines">
        <option value="Aspirin">
        <option value="Ibuprofen">
        <option value="Paracetamol">
        <option value="Amoxicillin">
        <option value="Metformin">
        <option value="Lisinopril">
        <option value="Atorvastatin">
        <option value="Omeprazole">
        <option value="Warfarin">
        <option value="Levothyroxine">
    </datalist>

    <script>
        // ===== DEPLOYMENT CONFIGURATION =====
        // For local development vs production
        const API_BASE_URL = window.location.hostname === 'localhost'
            ? 'http://localhost:5000'
            : '';  // Empty means same domain (Render will serve both frontend and API)

        console.log('🌐 Using API URL:', API_BASE_URL || 'same domain');
        // ===================================
        let medicationCount = 1;

        function addMedication() {
            medicationCount++;
            const list = document.getElementById('medicationsList');
            const newRow = document.createElement('div');
            newRow.className = 'form-row';
            newRow.id = `medRow${medicationCount}`;
            newRow.innerHTML = `
                <input type="text" placeholder="Medicine name" class="med-name" list="medicines">
                <input type="text" placeholder="Dosage (e.g., 500mg)" class="med-dosage">
                <input type="text" placeholder="Timing (e.g., 8:00 AM)" class="med-timing">
                <button class="remove-btn" onclick="removeMedication(${medicationCount})">
                    <i class="fas fa-trash"></i>
                </button>
            `;
            list.appendChild(newRow);

            // Show remove button on first row if hidden
            const firstRow = document.getElementById('medRow1');
            if (firstRow) {
                const firstRemoveBtn = firstRow.querySelector('.remove-btn');
                if (firstRemoveBtn) {
                    firstRemoveBtn.style.visibility = 'visible';
                }
            }
        }

        function removeMedication(id) {
            const row = document.getElementById(`medRow${id}`);
            row.remove();

            // If only one row left, hide its remove button
            const rows = document.querySelectorAll('.form-row');
            if (rows.length === 1) {
                const removeBtn = rows[0].querySelector('.remove-btn');
                if (removeBtn) {
                    removeBtn.style.visibility = 'hidden';
                }
            }
        }

        async function checkInteractions() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user'));

            if (!token || !user) {
                alert('Please login to use this feature');
                window.location.href = 'login.html';
                return;
            }

            const medications = [];
            const rows = document.querySelectorAll('.form-row');

            rows.forEach(row => {
                const name = row.querySelector('.med-name').value.trim();
                const dosage = row.querySelector('.med-dosage').value.trim();
                const timing = row.querySelector('.med-timing').value.trim();

                if (name) {
                    medications.push({ name, dosage, timing });
                }
            });

            if (medications.length < 2) {
                alert('Please add at least 2 medications to check interactions');
                return;
            }

            // Show results section
            const resultsSection = document.getElementById('resultsSection');
            resultsSection.style.display = 'block';

            // Show loading
            const results = document.getElementById('interactionResults');
            results.innerHTML = `
        <div style="text-align: center; padding: 40px;">
            <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; color: var(--primary);"></i>
            <p style="margin-top: 20px;">AI analyzing medication interactions...</p>
        </div>
    `;

            try {
                const response = await fetch(`${API_BASE_URL}/api/drugs/interactions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ medications })
                });

                const data = await response.json();

                if (data.success) {
                    displayResults(data.interactions, medications, data.statistics, data.used_fallback, data.unknown_drugs);
                } else {
                    results.innerHTML = `
                <div style="text-align: center; color: var(--danger); padding: 40px;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 3rem;"></i>
                    <p style="margin-top: 20px;">${data.error || 'Analysis failed'}</p>
                </div>
            `;
                }
            } catch (error) {
                console.error('Error:', error);
                results.innerHTML = `
            <div style="text-align: center; color: var(--danger); padding: 40px;">
                <i class="fas fa-exclamation-triangle" style="font-size: 3rem;"></i>
                <p style="margin-top: 20px;">Network error. Please check if servers are running.</p>
            </div>
        `;
            }
        }

        function analyzeInteractions(medications) {
            // Sample interaction database (replace with actual medical database)
            const interactionDB = {
                'Aspirin-Ibuprofen': {
                    severity: 'danger',
                    description: 'Increased risk of gastrointestinal bleeding when combined',
                    mechanism: 'Both medications inhibit platelet aggregation and can irritate the stomach lining',
                    recommendation: 'Avoid concurrent use. Consider alternative pain relievers or maintain at least 8 hours between doses.'
                },
                'Warfarin-Aspirin': {
                    severity: 'danger',
                    description: 'Significantly increased bleeding risk',
                    mechanism: 'Both medications affect blood clotting through different mechanisms',
                    recommendation: 'Avoid combination unless specifically prescribed by doctor with close monitoring'
                },
                'Metformin-Lisinopril': {
                    severity: 'warning',
                    description: 'May increase risk of hypoglycemia',
                    mechanism: 'Lisinopril can enhance glucose-lowering effects',
                    recommendation: 'Monitor blood sugar levels closely when starting this combination'
                },
                'Amoxicillin-Warfarin': {
                    severity: 'warning',
                    description: 'May increase warfarin effect and bleeding risk',
                    mechanism: 'Antibiotics can alter gut flora affecting vitamin K production',
                    recommendation: 'Monitor INR more frequently during antibiotic therapy'
                }
            };

            const results = [];

            // Check each pair of medications
            for (let i = 0; i < medications.length; i++) {
                for (let j = i + 1; j < medications.length; j++) {
                    const pair1 = `${medications[i].name}-${medications[j].name}`;
                    const pair2 = `${medications[j].name}-${medications[i].name}`;

                    const interaction = interactionDB[pair1] || interactionDB[pair2];

                    if (interaction) {
                        results.push({
                            med1: medications[i].name,
                            med2: medications[j].name,
                            ...interaction
                        });
                    } else {
                        results.push({
                            med1: medications[i].name,
                            med2: medications[j].name,
                            severity: 'safe',
                            description: 'No known significant interactions',
                            mechanism: 'These medications are generally safe to take together',
                            recommendation: 'Continue as prescribed, but always consult your doctor if you experience unusual symptoms'
                        });
                    }
                }
            }

            return results;
        }

        function displayResults(interactions, medications, statistics, usedFallback, unknownDrugs) {
            const results = document.getElementById('interactionResults');
            let html = '';

            // Summary Statistics
            html += `
        <div class="info-box" style="margin-bottom: 25px;">
            <h3 style="margin-bottom: 10px;"><i class="fas fa-chart-pie"></i> Summary</h3>
            <p>Found <strong>${statistics.total}</strong> medication combinations</p>
            <div style="display: flex; gap: 15px; margin-top: 10px;">
                ${statistics.danger > 0 ? `<span style="background: var(--danger); color: white; padding: 5px 15px; border-radius: 50px;">🔴 ${statistics.danger} Dangerous</span>` : ''}
                ${statistics.warning > 0 ? `<span style="background: #ffc107; color: var(--dark); padding: 5px 15px; border-radius: 50px;">🟡 ${statistics.warning} Cautionary</span>` : ''}
                ${statistics.safe > 0 ? `<span style="background: #4caf50; color: white; padding: 5px 15px; border-radius: 50px;">🟢 ${statistics.safe} Safe</span>` : ''}
            </div>
        </div>
    `;

            // Process each interaction
            interactions.forEach(interaction => {
                const severityClass = interaction.severity;
                const severityIcon = interaction.severity === 'danger' ? '🔴' :
                    interaction.severity === 'warning' ? '🟡' : '🟢';

                const severityTitle = interaction.severity === 'danger' ? 'Dangerous Interaction' :
                    interaction.severity === 'warning' ? 'Use with Caution' : 'Safe Combination';

                // Format timing recommendation
                let timingAdvice = '';
                if (interaction.hours_gap) {
                    const gapStatus = interaction.hours_gap >= 8 ? '✅ Adequate gap' :
                        interaction.hours_gap >= 4 ? '⚠️ Moderate gap' : '❌ Insufficient gap';

                    timingAdvice = `
                <div style="margin: 15px 0; padding: 12px; background: #f8f9fa; border-radius: 8px;">
                    <strong><i class="fas fa-clock"></i> Timing Analysis:</strong>
                    <p>Current gap: ${interaction.hours_gap} hours between doses (${gapStatus})</p>
                    <p style="color: var(--secondary); margin-top: 5px;">${interaction.timing_recommendation || 'Maintain at least 4-8 hours gap between these medications.'}</p>
                </div>
            `;
                }

                // Dosage recommendations
                const dosageAdvice = `
            <div style="margin: 15px 0; padding: 12px; background: #f0f7ff; border-radius: 8px;">
                <strong><i class="fas fa-capsules"></i> Dosage Recommendations:</strong>
                <ul style="margin-top: 8px; margin-left: 20px;">
                    <li>${interaction.med1}: Take as prescribed ${interaction.dosage1 ? `(${interaction.dosage1})` : ''}</li>
                    <li>${interaction.med2}: Take as prescribed ${interaction.dosage2 ? `(${interaction.dosage2})` : ''}</li>
                    ${interaction.severity === 'danger' ? '<li style="color: var(--danger);">⚠️ Consider consulting doctor for dosage adjustment</li>' : ''}
                </ul>
            </div>
        `;

                // Safety monitoring advice
                const safetyAdvice = `
            <div style="margin: 15px 0; padding: 12px; background: #fff1e6; border-radius: 8px;">
                <strong><i class="fas fa-shield-alt"></i> What to Watch For:</strong>
                <p style="margin-top: 8px;">${interaction.monitoring_advice || 'Watch for unusual symptoms and report to your doctor.'}</p>
            </div>
        `;

                // Alternative suggestions
                const alternativeAdvice = interaction.alternatives ? `
            <div style="margin: 15px 0; padding: 12px; background: #e8f5e9; border-radius: 8px;">
                <strong><i class="fas fa-exchange-alt"></i> Alternatives to Discuss with Doctor:</strong>
                <p style="margin-top: 8px;">${interaction.alternatives}</p>
            </div>
        ` : '';

                // Build the complete card
                html += `
            <div class="interaction-card ${severityClass}" style="margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
                    <div class="medication-pair" style="font-size: 1.3rem;">
                        ${severityIcon} ${interaction.med1} + ${interaction.med2}
                    </div>
                    <span class="severity-badge ${severityClass}" style="font-size: 1rem; padding: 8px 20px;">
                        ${severityTitle}
                    </span>
                </div>
                
                <div style="background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
                    <p style="font-size: 1rem; line-height: 1.6; color: var(--dark);">
                        <strong>Description:</strong> ${interaction.description}
                    </p>
                    <p style="font-size: 0.95rem; line-height: 1.6; color: var(--gray); margin-top: 10px;">
                        <strong>Mechanism:</strong> ${interaction.mechanism}
                    </p>
                </div>

                ${dosageAdvice}
                ${timingAdvice}
                ${safetyAdvice}
                ${alternativeAdvice}

                <div style="margin-top: 15px; padding: 10px; background: #f8f9fa; border-radius: 8px; font-size: 0.85rem; color: var(--gray);">
                    <i class="fas fa-info-circle"></i> 
                    Analysis based on medical database
                    ${interaction.hours_gap ? ` | ${interaction.hours_gap} hours between doses` : ''}
                </div>
            </div>
        `;
            });

            // Add medication schedule timeline
            const medsWithTiming = medications.filter(med => med.timing && med.timing.trim() !== '');
            if (medsWithTiming.length >= 2) {
                const sortedMeds = [...medsWithTiming].sort((a, b) => {
                    const timeA = a.timing ? new Date('1970-01-01T' + a.timing.replace(' ', '')).getTime() : 0;
                    const timeB = b.timing ? new Date('1970-01-01T' + b.timing.replace(' ', '')).getTime() : 0;
                    return timeA - timeB;
                });

                html += `
            <div class="timeline-container">
                <h3 style="margin-bottom: 20px;"><i class="fas fa-calendar-alt"></i> Your Medication Schedule</h3>
                <div style="display: flex; justify-content: space-between; align-items: center; margin: 30px 0; position: relative;">
                    <div style="position: absolute; top: 50%; left: 5%; right: 5%; height: 2px; background: #ddd; z-index: 1;"></div>
                    ${sortedMeds.map(med => `
                        <div style="position: relative; z-index: 2; background: white; padding: 10px 20px; border-radius: 50px; 
                            border: 2px solid ${interactions.some(i => i.severity === 'danger' && (i.med1 === med.name || i.med2 === med.name)) ? 'var(--danger)' : 'var(--primary)'}; 
                            text-align: center; min-width: 120px;">
                            <strong>${med.name}</strong><br>
                            <small>${med.timing}</small>
                            ${med.dosage ? `<br><small style="color: var(--gray);">${med.dosage}</small>` : ''}
                        </div>
                    `).join('')}
                </div>
                
                <div style="margin-top: 25px; padding: 15px; background: #e3f2fd; border-radius: 8px;">
                    <strong><i class="fas fa-lightbulb"></i> Schedule Tips:</strong>
                    <ul style="margin-top: 10px; margin-left: 20px;">
                        <li>Take medications at the same time each day</li>
                        <li>Use pill organizer to avoid missed doses</li>
                        <li>Set phone reminders for each medication</li>
                        <li>Keep a medication diary to track effects</li>
                    </ul>
                </div>
            </div>
        `;
            }

            results.innerHTML = html;
        }
    </script>
</body>

</html>
